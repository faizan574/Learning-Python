<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 720" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="940" height="720" fill="#fbfaf6"/>
  <text x="470" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">AREA FOCUS: MAHABUBNAGAR (PALAMURU)</text>
  <text x="470" y="54" text-anchor="middle" font-size="12" fill="#7f8c8d">Geology + cultural references read together on one map — schematic, NOT to scale</text>

  <!-- Region outline (old undivided Mahabubnagar, stylized) -->
  <polygon points="180,140 420,120 620,170 760,300 740,470 560,560 380,600 220,560 120,420 130,260"
           fill="#f5efdf" stroke="#a67c00" stroke-width="3"/>

  <!-- Geology zones -->
  <!-- Archean granite west/centre -->
  <ellipse cx="330" cy="330" rx="185" ry="165" fill="#f0d9c0" opacity="0.65"/>
  <text x="330" y="250" text-anchor="middle" font-size="13" font-weight="bold" fill="#8a5a2b">GEOLOGY: Archean granite–gneiss</text>
  <text x="330" y="268" text-anchor="middle" font-size="11" fill="#8a5a2b" font-style="italic">(Peninsular Gneissic Complex — among India's oldest rocks;</text>
  <text x="330" y="283" text-anchor="middle" font-size="11" fill="#8a5a2b" font-style="italic">widely quarried granite; thin red chalka soils; drought-prone)</text>

  <!-- Cuddapah basin / Nallamala east -->
  <ellipse cx="640" cy="380" rx="130" ry="150" fill="#cfe3cf" opacity="0.8"/>
  <text x="645" y="300" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6b2e">GEOLOGY: Cuddapah basin rocks</text>
  <text x="645" y="318" text-anchor="middle" font-size="11" fill="#2e6b2e" font-style="italic">(Proterozoic quartzites/shales — Nallamala hills,</text>
  <text x="645" y="333" text-anchor="middle" font-size="11" fill="#2e6b2e" font-style="italic">Amrabad plateau; uranium exploration controversy)</text>

  <!-- Krishna river along south -->
  <path d="M 140,430 C 220,500 300,545 400,560 C 500,575 600,540 700,480"
        fill="none" stroke="#3b82c4" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  <text x="400" y="585" font-size="13" fill="#1f5f9e" font-style="italic" font-weight="bold">Krishna river</text>

  <!-- Tungabhadra joining -->
  <path d="M 200,640 C 240,610 270,580 300,552" fill="none" stroke="#3b82c4" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <text x="185" y="660" font-size="11" fill="#1f5f9e" font-style="italic">Tungabhadra</text>

  <!-- Entry point Tangadi + Jurala -->
  <circle cx="160" cy="447" r="6" fill="#1f5f9e"/>
  <text x="168" y="438" font-size="11" fill="#1f5f9e" font-weight="bold">Tangadi — Krishna ENTERS Telangana here</text>
  <circle cx="235" cy="505" r="6" fill="#1f5f9e"/>
  <text x="243" y="498" font-size="11" fill="#1f5f9e" font-weight="bold">Jurala — 1st Telangana project on Krishna</text>

  <!-- Cultural landmarks -->
  <!-- Alampur -->
  <circle cx="300" cy="552" r="7" fill="#8e44ad"/>
  <text x="300" y="533" text-anchor="middle" font-size="12" font-weight="bold" fill="#8e44ad">ALAMPUR ★</text>
  <text x="300" y="620" text-anchor="middle" font-size="11" fill="#8e44ad">Jogulamba — 5th Shakti Peetha · Navabrahma temples</text>
  <text x="300" y="635" text-anchor="middle" font-size="11" fill="#8e44ad">(Badami Chalukyas, 7th c.) at the Tungabhadra–Krishna confluence</text>

  <!-- Gadwal -->
  <circle cx="215" cy="475" r="6" fill="#8e44ad"/>
  <text x="212" y="465" text-anchor="end" font-size="12" font-weight="bold" fill="#8e44ad">GADWAL</text>
  <text x="205" y="480" text-anchor="end" font-size="11" fill="#8e44ad">fort · samsthanam ·</text>
  <text x="205" y="494" text-anchor="end" font-size="11" fill="#8e44ad">GI-tag handloom sarees</text>

  <!-- Wanaparthy -->
  <circle cx="360" cy="470" r="6" fill="#8e44ad"/>
  <text x="360" y="460" text-anchor="middle" font-size="12" font-weight="bold" fill="#8e44ad">WANAPARTHY</text>
  <text x="360" y="490" text-anchor="middle" font-size="11" fill="#8e44ad">samsthanam — patron of Telugu letters</text>

  <!-- Kollapur -->
  <circle cx="470" cy="510" r="6" fill="#8e44ad"/>
  <text x="470" y="500" text-anchor="middle" font-size="12" font-weight="bold" fill="#8e44ad">KOLLAPUR</text>

  <!-- Mahabubnagar town + Pillalamarri -->
  <circle cx="330" cy="380" r="7" fill="#c0392b"/>
  <text x="330" y="368" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">MAHABUBNAGAR TOWN</text>
  <text x="330" y="400" text-anchor="middle" font-size="11" fill="#8e44ad">Pillalamarri — 800-year-old giant banyan</text>
  <text x="330" y="415" text-anchor="middle" font-size="11" fill="#8e44ad">renamed 1890 after Nizam VI Mir Mahbub Ali Khan (old name: Palamooru)</text>

  <!-- Uma Maheshwaram -->
  <circle cx="560" cy="430" r="6" fill="#8e44ad"/>
  <text x="560" y="420" text-anchor="middle" font-size="12" font-weight="bold" fill="#8e44ad">UMA MAHESHWARAM</text>
  <text x="560" y="447" text-anchor="middle" font-size="11" fill="#8e44ad">northern gateway of Srisailam</text>

  <!-- Amrabad / Chenchus / Mallela Theertham -->
  <circle cx="655" cy="400" r="6" fill="#2e6b2e"/>
  <text x="655" y="390" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6b2e">AMRABAD TIGER RESERVE</text>
  <text x="655" y="417" text-anchor="middle" font-size="11" fill="#2e6b2e">Chenchu tribal homeland</text>
  <circle cx="620" cy="470" r="5" fill="#2e6b2e"/>
  <text x="620" y="490" text-anchor="middle" font-size="11" fill="#2e6b2e">Mallela Theertham falls</text>

  <!-- Human geography note -->
  <rect x="30" y="90" width="290" height="66" rx="8" fill="#fff4f2" stroke="#e74c3c"/>
  <text x="45" y="112" font-size="12" font-weight="bold" fill="#c0392b">HUMAN GEOGRAPHY</text>
  <text x="45" y="130" font-size="11" fill="#c0392b">'Palamuru labour' — drought-driven migration;</text>
  <text x="45" y="145" font-size="11" fill="#c0392b">answered today by Palamuru–Rangareddy LIS &amp; welfare schemes</text>

  <!-- Legend -->
  <rect x="640" y="600" width="280" height="105" rx="8" fill="#ffffff" stroke="#bdc3c7"/>
  <text x="655" y="622" font-size="12" font-weight="bold" fill="#2c3e50">Legend</text>
  <circle cx="663" cy="640" r="5" fill="#8e44ad"/><text x="676" y="644" font-size="11" fill="#2c3e50">Cultural reference site</text>
  <circle cx="663" cy="660" r="5" fill="#1f5f9e"/><text x="676" y="664" font-size="11" fill="#2c3e50">River landmark / project</text>
  <circle cx="663" cy="680" r="5" fill="#2e6b2e"/><text x="676" y="684" font-size="11" fill="#2c3e50">Forest / geology-east zone</text>
  <text x="655" y="700" font-size="11" fill="#2c3e50">Shaded zones = geological provinces</text>
</svg>
