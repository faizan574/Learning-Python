name: TGPSC Daily Prep Notification

# Safety net: the daily Claude Routine ("TGPSC Daily Fresh Lesson") delivers a
# freshly written lesson each morning via the Post TGPSC Lesson Issue workflow.
# If no lesson issue for today exists by 8:30 AM IST, this posts one from the
# pre-authored topic bank in tgpsc-prep/data so a day is never missed. Can also
# be run manually from the Actions tab for an extra on-demand lesson.
on:
  schedule:
    # 03:00 UTC = 8:30 AM IST, every day
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  daily-lesson:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Skip if today's lesson issue already exists
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          today=$(TZ=Asia/Kolkata date +%F)
          count=$(gh issue list --repo "$GITHUB_REPOSITORY" --state all --limit 100 --json title \
            --jq "[.[] | select(.title | contains(\"TGPSC Daily Prep\") and contains(\"$today\"))] | length")
          echo "exists=$count" >> "$GITHUB_OUTPUT"

      - name: Generate today's lesson
        if: steps.guard.outputs.exists == '0'
        run: python tgpsc-prep/generator.py --out lesson.md --title-out title.txt

      - name: Open notification issue with the lesson
        if: steps.guard.outputs.exists == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "$(cat title.txt)" \
            --body-file lesson.md

      - name: Check whether Gmail delivery is configured
        if: steps.guard.outputs.exists == '0'
        id: mailcfg
        env:
          GMAIL_PW: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_ADDR: ${{ secrets.GMAIL_ADDRESS }}
        run: |
          if [ -n "$GMAIL_PW" ] && [ -n "$GMAIL_ADDR" ]; then
            echo "enabled=yes" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=no" >> "$GITHUB_OUTPUT"
            echo "Gmail secrets not set — skipping direct email (GitHub's own notification still applies)."
          fi
          echo "title=$(cat title.txt)" >> "$GITHUB_OUTPUT"

      - name: Email the lesson directly via Gmail
        if: steps.guard.outputs.exists == '0' && steps.mailcfg.outputs.enabled == 'yes'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.mailcfg.outputs.title }}
          to: ${{ secrets.GMAIL_ADDRESS }}
          from: TGPSC Daily Prep <${{ secrets.GMAIL_ADDRESS }}>
          html_body: file://lesson.md
          convert_markdown: true
