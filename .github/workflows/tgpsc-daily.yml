name: TGPSC Daily Prep Notification

# Daily lessons are generated fresh by a Claude Routine ("TGPSC Daily Fresh
# Lesson"). This workflow is a manual fallback that posts a lesson from the
# pre-authored topic bank in tgpsc-prep/data — trigger it from the Actions tab.
on:
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  daily-lesson:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate today's lesson
        run: python tgpsc-prep/generator.py --out lesson.md --title-out title.txt

      - name: Open notification issue with the lesson
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "$(cat title.txt)" \
            --body-file lesson.md
