name: Post TGPSC Lesson Issue

# Fires whenever a lesson file lands in tgpsc-prep/lessons/ (on any branch —
# the daily Claude Routine pushes fresh lessons from its own session branch).
# Opens the notification issue from the file, then archives the lesson to main
# so future Routine runs can see which topics are already covered.
on:
  push:
    paths:
      - "tgpsc-prep/lessons/day-*.md"
      - "tgpsc-prep/lessons/tech-day-*.md"

permissions:
  contents: write
  issues: write

jobs:
  post-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Locate newest lesson
        id: lesson
        run: |
          # Prefer the lesson file changed by this push (works for both the GS
          # day-*.md and technical tech-day-*.md series); fall back to newest.
          file=$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}" \
            | grep -E '^tgpsc-prep/lessons/(tech-)?day-[0-9]+\.md$' | tail -1)
          if [ -z "$file" ]; then
            file=$(ls -1 tgpsc-prep/lessons/day-*.md tgpsc-prep/lessons/tech-day-*.md 2>/dev/null | sort -V | tail -1)
          fi
          echo "file=$file" >> "$GITHUB_OUTPUT"
          echo "title=$(head -1 "$file" | sed 's/^#\+ *//')" >> "$GITHUB_OUTPUT"

      - name: Create issue if not already posted
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: ${{ steps.lesson.outputs.title }}
        run: |
          count=$(gh issue list --repo "$GITHUB_REPOSITORY" --state all --limit 100 --json title \
            --jq '[.[] | select(.title == env.TITLE)] | length')
          if [ "$count" -eq 0 ]; then
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$TITLE" \
              --body-file "${{ steps.lesson.outputs.file }}"
          else
            echo "Issue '$TITLE' already exists — skipping."
          fi

      - name: Check whether Gmail delivery is configured
        id: mailcfg
        env:
          GMAIL_PW: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_ADDR: ${{ secrets.GMAIL_ADDRESS }}
        run: |
          if [ -n "$GMAIL_PW" ] && [ -n "$GMAIL_ADDR" ]; then
            echo "enabled=yes" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=no" >> "$GITHUB_OUTPUT"
            echo "Gmail secrets not set — skipping direct email (GitHub's own notification still applies)."
          fi

      - name: Email the lesson directly via Gmail
        if: steps.mailcfg.outputs.enabled == 'yes'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.lesson.outputs.title }}
          to: ${{ secrets.GMAIL_ADDRESS }}
          from: TGPSC Daily Prep <${{ secrets.GMAIL_ADDRESS }}>
          html_body: file://${{ steps.lesson.outputs.file }}
          convert_markdown: true

      - name: Archive lesson to main
        if: github.ref != 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git checkout "${{ github.sha }}" -- tgpsc-prep/lessons/
          git add tgpsc-prep/lessons/
          if ! git diff --cached --quiet; then
            git commit -m "Archive TGPSC lesson files [skip ci]"
            git push origin main
          else
            echo "Lesson files already on main — nothing to archive."
          fi
